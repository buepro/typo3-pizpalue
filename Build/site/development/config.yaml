base: 'https://pizpalue.ddev.site/'
baseVariants:
  -
    base: 'https://dev.pizpalue.ddev.site/'
    condition: 'getenv("HTTP_HOST") == "dev.pizpalue.ddev.site"'
dependencies:
  - pizpalue/full
easyconf:
  data:
    admin:
      siteConfiguration:
        overwriteBase: '1'
        overwriteBaseVariants: '0'
        overwriteRobots: '0'
        overwriteSitemap: '0'
        manageNewsRouteEnhancer: '1'
        removeLegacyNewsRouteEnhancers: '0'
        overwritePageNotFound: '0'
      easyconf:
        showAllProperties: '1'
    style:
      global:
        enableScss: '0'
errorHandling:
  -
    errorCode: 404
    errorHandler: Page
    errorContentSource: 't3://page?uid=34'
languages:
  -
    title: English
    enabled: true
    languageId: 0
    base: /
    typo3Language: default
    locale: en_GB.utf8
    iso-639-1: en
    navigationTitle: English
    hreflang: en-GB
    direction: ltr
    flag: gb
    websiteTitle: ''
  -
    title: Deutsch
    enabled: true
    base: 'https://pizpalue.ddev.site/de/'
    typo3Language: de
    locale: de_CH.UTF-8
    iso-639-1: de
    websiteTitle: ''
    navigationTitle: Deutsch
    hreflang: de-CH
    direction: ''
    fallbackType: fallback
    fallbacks: ''
    flag: ch
    languageId: 1
rootPageId: 1
routes:
  -
    route: robots.txt
    type: staticText
    content: "User-agent: *\r\nDisallow: /typo3/\r\nDisallow: /typo3_src/\r\nAllow: /typo3/sysext/frontend/Resources/Public/*\r\n\r\nSitemap: https://pizpalue.ddev.site/sitemap.xml\r\n"
  -
    route: sitemap.xml
    type: uri
    source: 'https://pizpalue.ddev.site/?type=1533906435'
websiteTitle: 'Pizpalue dev site'
